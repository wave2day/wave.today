<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Top bar — pills + buttons</title>

  












  <link rel="stylesheet" href="css/past-core.css">
  <link rel="stylesheet" href="css/past-layout.css">

</head>

<body>
  <div class="topBar">
    <!-- MAIN PAGE pill -->
    <div class="wtBarRow" aria-label="Main page">
      <div class="wtGlass isPill scalePill" id="mainPill">
        <div class="pressGlow"></div>
        <a class="wtCore" href="index.html" aria-label="Main page" draggable="false">
          <span class="wtText">main page</span>
        </a>
      </div>
    </div>

    <!-- MODE buttons -->
    <div class="rightGroup">
      <div id="wtModes" class="wtBarRow" aria-label="Řazení">
        <div class="wtModeBtn isActive" data-mode="date" aria-label="Řazení podle data">
          <div class="wtGlass scaleRound">
            <div class="pressGlow"></div>
            <button class="wtCore" type="button" aria-label="date">
              <span class="wtText">date</span>
            </button>
          </div>
        </div>

        <div class="wtModeBtn" data-mode="random" aria-label="Náhodné rozložení">
          <div class="wtGlass scaleRound">
            <div class="pressGlow"></div>
            <button class="wtCore" type="button" aria-label="rndm">
              <span class="wtText">rndm</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- jen aby bylo vidět, že topbar sedí a stránka žije -->

  <!-- ===== DESKTOP: ambient + grid + hero ===== -->
  <div id="pageBase" aria-hidden="true"></div>
  <div id="ambientBg" aria-hidden="true"></div>
  <div id="ambientPoster" aria-hidden="true"></div>
  <div id="ambientGlow" aria-hidden="true"></div>

  <div class="glassPage">
    <div id="eventsGrid" aria-label="Seznam plakátů"></div>
  </div>

  <div id="heroOverlay" aria-hidden="true">
    <div class="heroBack" data-hero-close="1"></div>
    <div class="heroCard" role="dialog" aria-modal="true"></div>
  </div>


  
  









  <script src="js/past-core.js"></script>
  
<script src="fog4-addon.js"></script>
</body>
</html>

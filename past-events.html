<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Past Events</title>

  <style>
    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0;
      background:transparent;
      color:#eef0ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x:hidden;
    }
    a,button{ -webkit-tap-highlight-color: transparent; }
    a:focus, a:focus-visible, button:focus, button:focus-visible{ outline:none !important; box-shadow:none !important; }

    /* ===== Base background ===== */
    #pageBase{
      position:fixed; inset:0; z-index:0;
      background:#0b0b10;
      pointer-events:none;
    }

    /* ===== Ambient background (no video) ===== */
    #ambientBg{
      position:fixed; inset:0; z-index:1;
      pointer-events:none;
      --ambR:145; --ambG:85; --ambB:255;
      background:
        radial-gradient(1100px 720px at 52% 16%, rgba(var(--ambR),var(--ambG),var(--ambB),.30), transparent 62%),
        radial-gradient(820px 520px at 18% 62%, rgba(80,150,255,.18), transparent 60%),
        radial-gradient(820px 520px at 86% 70%, rgba(255,70,205,.14), transparent 60%),
        linear-gradient(180deg, #0b0b10, #0b0b10);
      transition: filter .35s ease, background .45s ease;
    }
    #ambientPoster{
      position:fixed; inset:-14vh; z-index:2;
      pointer-events:none;
      background:none;
      background-size:cover;
      background-position:center;
      filter: blur(64px) saturate(1.12);
      opacity:.28;
      transform: scale(1.05);
      mix-blend-mode: screen;
      transition: background-image .55s ease, opacity .55s ease;
    }
    #ambientGlow{
      position:fixed; inset:-12vh; z-index:3;
      pointer-events:none;
      background: radial-gradient(circle at 50% 45%, rgba(120,150,255,.35), transparent 58%);
      filter: blur(20px) saturate(1.2);
      mix-blend-mode: screen;
      opacity:.92;
      transition: background .55s ease, opacity .55s ease;
    }
    @keyframes wtAmbientDrift{
      0%{ transform: translate3d(0,0,0) scale(1.02); filter: blur(18px) saturate(1.25); }
      50%{ transform: translate3d(1.5vw,-1.2vh,0) scale(1.04); filter: blur(20px) saturate(1.35); }
      100%{ transform: translate3d(0,0,0) scale(1.02); filter: blur(18px) saturate(1.25); }
    }
    #ambientPoster{ animation: wtAmbientDrift 8.5s ease-in-out infinite; }
    #ambientGlow{ animation: wtAmbientDrift 7.2s ease-in-out infinite reverse; }

    /* ===== Page ===== */
    .glassPage{
      position:relative;
      z-index:10;
      min-height:100vh;
      padding: 160px 18px 90px;
      background: rgba(255,255,255,.020);
    }
    .glassPage > *{ position:relative; z-index:2; }

    /* ===== Topbar ===== */
    .topBar{
      position:fixed; top:0; left:0; right:0;
      z-index:20;
      width: min(1180px, calc(100vw - 36px));
      margin:0 auto;
      padding: calc(env(safe-area-inset-top) + 12px) 0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }
    .rightGroup{ display:flex; gap:12px; align-items:center; margin-left:auto; }

    .titleMini{
      font-weight:900;
      letter-spacing:.6px;
      color: rgba(255,255,255,.88);
      text-shadow: 0 14px 36px rgba(0,0,0,.55);
      user-select:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* ===== Glass engine (reused for pill + mode buttons) ===== */
    .glassBase{
      --outer: 190px;
      --innerRatio: .65;
      --glassRingThickness: 13px;
      --glassRimBlur: 1.05px;

      --glassClearA: rgba(255,255,255,.14);
      --glassClearB: rgba(255,255,255,.08);
      --glassMilkA:  rgba(255,255,255,.10);
      --glassMilkB:  rgba(255,255,255,.12);

      --topRim1: rgba(0,0,0,.28);
      --topRim2: rgba(0,0,0,.12);
      --topRimFade: 30%;

      --botRim1: rgba(255,255,255,.74);
      --botRim2: rgba(255,255,255,.30);

      --bleedA: .14;
      --bleedB: .07;

      --pressY: 3px;
      --pressTimeIn: 110ms;
      --pressTimeOut: 190ms;

      --textColor: rgba(255,255,255,.92);
      --textSize: 34px;
      --textScaleX: 1.10;
      --textWidth: 92%;

      --stroke: rgba(0,0,0,.34);
      --depth1: rgba(0,0,0,.30);
      --depth2: rgba(0,0,0,.18);
      --lacquer: rgba(255,255,255,.28);

      --rimTint: 120, 155, 255;
      --bleedX: 76%;
      --bleedY: 84%;

      width: var(--w, var(--outer));
      height: var(--h, var(--outer));
      border-radius: var(--r, 50%);
      position:relative;
      display:grid;
      place-items:center;
      isolation:isolate;

      background:
        radial-gradient(120% 120% at 50% 60%, var(--glassMilkA), transparent 62%),
        radial-gradient(120% 120% at 50% 92%, var(--glassMilkB), transparent 58%),
        radial-gradient(120% 120% at 35% 25%, var(--glassClearA), transparent 55%),
        radial-gradient(140% 140% at 65% 70%, var(--glassClearB), transparent 60%),
        rgba(255,255,255,.08);

      box-shadow:
        inset 0 18px 26px rgba(0,0,0,.24),
        inset 0 -22px 30px rgba(255,255,255,.22),
        0 22px 44px rgba(0,0,0,.18);

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      transition: filter var(--pressTimeOut) ease;
    }
    .glassBase::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius: inherit;
      pointer-events:none;
      z-index:1;
      background:
        radial-gradient(75% 60% at 18% 22%,
          rgba(255,255,255,.42) 0%,
          rgba(255,255,255,.18) 35%,
          transparent 72%),
        radial-gradient(55% 45% at 28% 32%,
          rgba(255,255,255,.18) 0%,
          transparent 72%);
      filter: blur(1.35px);
      opacity:.90;
    }
    .glassBase::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius: inherit;
      pointer-events:none;
      z-index:2;
      background:
        radial-gradient(72% 60% at var(--bleedX) var(--bleedY),
          rgba(var(--rimTint), var(--bleedA)) 0%,
          rgba(var(--rimTint), var(--bleedB)) 28%,
          transparent 68%),

        conic-gradient(from 210deg,
          transparent 0 18%,
          rgba(var(--rimTint), .12) 22%,
          transparent 36%,
          rgba(var(--rimTint), .06) 46%,
          transparent 62%,
          rgba(var(--rimTint), .045) 70%,
          transparent 100%),

        radial-gradient(140% 120% at 50% 120%,
          var(--botRim1) 0%,
          var(--botRim2) 22%,
          transparent 52%),

        radial-gradient(170% 120% at 50% -38%,
          var(--topRim1) 0%,
          var(--topRim2) 14%,
          transparent var(--topRimFade));

      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;

      padding: var(--glassRingThickness);
      filter: blur(var(--glassRimBlur));
      opacity:.92;
    }
    .pressGlow{
      position:absolute;
      inset:-22px;
      border-radius: inherit;
      pointer-events:none;
      opacity:0;
      filter: blur(10px);
      transition: opacity var(--pressTimeOut) ease, transform var(--pressTimeOut) ease;
      transform: scale(0.995);
      z-index:0;
      background:
        radial-gradient(80% 80% at 70% 70%,
          rgba(var(--rimTint), .18) 0%,
          rgba(var(--rimTint), .10) 26%,
          transparent 62%),
        radial-gradient(100% 90% at 50% 110%,
          rgba(255,255,255,.20) 0%,
          transparent 55%);
    }

    .coreBtn{
      --cw: calc(var(--outer) * var(--innerRatio));
      --ch: calc(var(--outer) * var(--innerRatio));
      width: var(--cw);
      height: var(--ch);
      border-radius: 999px;
      position:relative;
      z-index:3;
      border:0;
      padding:0;
      cursor:pointer;
      user-select:none;
      background:
        radial-gradient(120% 120% at 35% 25%, rgba(255,255,255,.16), transparent 55%),
        linear-gradient(180deg, var(--c1,#6f7ed0), var(--c2,#5462bb) 55%, var(--c3,#4a57ae));
      box-shadow:
        0 18px 26px rgba(0,0,0,.18),
        inset 0 16px 22px rgba(0,0,0,.13),
        inset 0 -14px 20px rgba(255,255,255,.14);
      transform: translateY(0);
      transition:
        transform var(--pressTimeOut) cubic-bezier(.2,.8,.2,1),
        box-shadow var(--pressTimeOut) ease,
        filter var(--pressTimeOut) ease;
      display:grid;
      place-items:center;
      text-decoration:none;
    }
    .glassBase:has(.coreBtn:active){ filter: brightness(.985); transition: filter var(--pressTimeIn) ease; }
    .glassBase:has(.coreBtn:active) .pressGlow{ opacity:1; transform: scale(1.01); transition: opacity var(--pressTimeIn) ease, transform var(--pressTimeIn) ease; }
    .coreBtn:active{
      transform: translateY(var(--pressY));
      transition:
        transform var(--pressTimeIn) cubic-bezier(.2,.8,.2,1),
        box-shadow var(--pressTimeIn) ease,
        filter var(--pressTimeIn) ease;
      box-shadow:
        0 10px 18px rgba(0,0,0,.16),
        inset 0 20px 26px rgba(0,0,0,.18),
        inset 0 -10px 16px rgba(255,255,255,.10);
      filter: brightness(.99) saturate(.98);
    }

    /* ===== Main pill ===== */
    #wtMainPill{
      --pillScale: .253;
      display:flex; align-items:center;
    }
    #wtMainPill .glassBase{
      zoom: var(--pillScale);
      transform-origin: left center;
      --w: 440px; --h: 190px; --r: 95px;
    }
    @supports not (zoom: 1){
      #wtMainPill .glassBase{ zoom:1; transform: scale(var(--pillScale)); }
    }
    #wtMainPill .coreText{
      color: rgba(255,255,255,.92);
      font-weight: 720;
      font-size: 34px;
      letter-spacing: .55px;
      text-transform: lowercase;
      transform: scaleX(1.12);
      text-shadow:
        -0.75px 0 0 rgba(0,0,0,.34),
         0.75px 0 0 rgba(0,0,0,.34),
         0 -0.75px 0 rgba(0,0,0,.34),
         0  0.75px 0 rgba(0,0,0,.34),
         0  1.25px 1.45px rgba(0,0,0,.30),
         0  3px 8px rgba(0,0,0,.18);
      pointer-events:none;
    }

    /* ===== Mode buttons ===== */
    #wtModes{
      display:flex;
      gap:12px;
      align-items:center;
      --modeScale: .235;
    }
    #wtModes .glassBase{
      zoom: var(--modeScale);
      transform-origin:center;
      filter: saturate(1.05) brightness(1.03);
    }
    @supports not (zoom: 1){
      #wtModes .glassBase{ zoom:1; transform: scale(var(--modeScale)); }
    }
    #wtModes .modeLabel{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      width: 92%;
      margin:0 auto;
      color: rgba(0,0,0,.92);
      font-weight:760;
      font-size: 36px;
      letter-spacing:.40px;
      text-transform: lowercase;
      transform: scaleX(1.10);
      text-shadow:none;
    }

    /* ===== Posters ===== */
    #eventsGrid{
      max-width: 980px;
      margin: 0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 26px;
      padding-top: 10px;
    }
    .poster{
      width: min(calc(100vw - 36px), 620px);
      margin: 0 auto;
      border: none !important;
      background: transparent !important;
      box-shadow:none !important;
      border-radius:0 !important;
      overflow: visible !important;
      transition: transform 520ms cubic-bezier(.2,.8,.2,1);
      display:block;
    }
    .poster img{
      width:100%;
      height:auto;
      display:block;
      border-radius:0 !important;
    }

    /* RANDOM layout: one consistent grid */
    #eventsGrid.randomMode{
      max-width: 1180px;
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      padding: 0 18px;
      align-items:start;
      justify-items:center;
    }
    #eventsGrid.randomMode .poster{
      width: 100%;
      max-width: 440px;
      margin:0;
      position:relative;
      transform:
        translate(var(--flipX,0px), var(--flipY,0px))
        translate(var(--tx,0px), var(--ty,0px))
        rotate(var(--rot,0deg))
        scale(var(--scl, 1));
      z-index: var(--z, 1);
    }
    @media (max-width: 560px){
      #eventsGrid.randomMode{
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 10px;
        padding: 0 10px;
      }
      #eventsGrid.randomMode .poster{ max-width:none; }
    }
    @media (min-width: 720px){
      #eventsGrid.randomMode{
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    /* Scroll safety: in rndm, temporarily remove transforms while scrolling (mobile paint glitch) */
    body.isScrolling #eventsGrid.randomMode .poster{
      transform:none !important;
    }

    .err{
      max-width: 980px;
      margin: 18px auto 0;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.9);
    }

    /* ===== HERO overlay ===== */
    #heroOverlay{
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items:center;
      justify-content:center;
      background: transparent;
    }
    #heroOverlay.isOpen{ display:flex; }
    #heroOverlay .heroBack{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.22);
    }
    #heroOverlay .heroCard{
      position: fixed;
      inset:0;
      width:100vw;
      height:100vh;
      border-radius:0;
      overflow:hidden;
      background: transparent;
      will-change:left, top, width, height;
    }
    #heroOverlay .rollWrap{
      position:absolute;
      inset:0;
      transform-origin: top;
      will-change: transform, filter;
    }
    #heroOverlay .rollWrap img{
      width:100%;
      height:100%;
      object-fit: contain;
      display:block;
      background: transparent;
    }

    @keyframes unrollPoster{
      0%   { transform: scaleY(0.02); filter: blur(1.6px); }
      55%  { transform: scaleY(1.02); filter: blur(.2px); }
      100% { transform: scaleY(1); filter: blur(0); }
    }
    @keyframes rollUpPoster{
      0%   { transform: scaleY(1); filter: blur(0); }
      100% { transform: scaleY(0.02); filter: blur(1.6px); }
    }
    #heroOverlay .heroCard.unrolling .rollWrap{ animation: unrollPoster 520ms cubic-bezier(.16,.9,.18,1) both; }
    #heroOverlay .heroCard.rollingUp  .rollWrap{ animation: rollUpPoster 260ms cubic-bezier(.2,.8,.2,1) both; }
  </style>
</head>

<body>
  <div id="pageBase" aria-hidden="true"></div>
  <div id="ambientBg"></div>
  <div id="ambientPoster"></div>
  <div id="ambientGlow"></div>

  <div class="topBar">
    <div id="wtMainPill" aria-label="Main page">
      <div class="glassBase">
        <div class="pressGlow"></div>
        <a class="coreBtn" href="index.html" aria-label="Main page">
          <span class="coreText">main page</span>
        </a>
      </div>
    </div>

    <div class="rightGroup">
      <div id="wtModes" aria-label="Řazení plakátů">
        <div class="wtModeBtn" data-mode="date" aria-label="Řazení podle data">
          <div class="glassBase">
            <div class="pressGlow"></div>
            <button class="coreBtn" type="button" aria-label="Řadit podle data">
              <span class="modeLabel">date</span>
            </button>
          </div>
        </div>

        <div class="wtModeBtn" data-mode="random" aria-label="Náhodné rozložení">
          <div class="glassBase">
            <div class="pressGlow"></div>
            <button class="coreBtn" type="button" aria-label="Náhodné rozložení">
              <span class="modeLabel">rndm</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="glassPage">
    <div id="eventsGrid" aria-label="Seznam plakátů"></div>
  </div>

  <!-- HERO overlay -->
  <div id="heroOverlay" aria-hidden="true">
    <div class="heroBack" data-hero-close="1"></div>
    <div class="heroCard" role="dialog" aria-modal="true"></div>
  </div>

  <script>
    const DATA_URL = 'data/events.json';

    const grid = document.getElementById('eventsGrid');
    const ambient = document.getElementById('ambientBg');
    const ambientGlow = document.getElementById('ambientGlow');
    const ambientPoster = document.getElementById('ambientPoster');
    const modeButtons = Array.from(document.querySelectorAll('#wtModes .wtModeBtn'));

    const clamp = (n,a,b)=> Math.max(a, Math.min(b,n));
    function parseDate(s){
      const [y,m,d] = String(s||'').split('-').map(Number);
      return new Date(y||1970, (m||1)-1, d||1, 12, 0, 0);
    }

    // ===== Ambient (smooth) =====
    let ambCurrent = { r:145, g:85, b:255 };
    let ambTarget  = { r:145, g:85, b:255 };
    let ambRAF = 0;

    function applyAmbient(){
      const r = Math.round(ambCurrent.r);
      const g = Math.round(ambCurrent.g);
      const b = Math.round(ambCurrent.b);

      ambient.style.setProperty('--ambR', r);
      ambient.style.setProperty('--ambG', g);
      ambient.style.setProperty('--ambB', b);

      ambientGlow.style.background =
        `radial-gradient(circle at 50% 42%, rgba(${r},${g},${b},.38), transparent 58%)`;
    }
    function tickAmbient(){
      ambCurrent.r += (ambTarget.r - ambCurrent.r) * 0.10;
      ambCurrent.g += (ambTarget.g - ambCurrent.g) * 0.10;
      ambCurrent.b += (ambTarget.b - ambCurrent.b) * 0.10;
      applyAmbient();

      const dr = Math.abs(ambTarget.r - ambCurrent.r);
      const dg = Math.abs(ambTarget.g - ambCurrent.g);
      const db = Math.abs(ambTarget.b - ambCurrent.b);
      if (dr + dg + db > 0.8) ambRAF = requestAnimationFrame(tickAmbient);
      else ambRAF = 0;
    }
    function setAmbientTarget(rgb){
      ambTarget = {
        r: clamp(rgb.r, 0, 255),
        g: clamp(rgb.g, 0, 255),
        b: clamp(rgb.b, 0, 255),
      };
      if(!ambRAF) ambRAF = requestAnimationFrame(tickAmbient);
    }
    async function getAverageColor(img){
      const c = document.createElement('canvas');
      const ctx = c.getContext('2d', { willReadFrequently:true });
      const w = 42, h = 42;
      c.width = w; c.height = h;

      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0,0,w,h).data;

      let r=0,g=0,b=0,count=0;
      for(let i=0;i<data.length;i+=4){
        const a = data[i+3];
        if(a < 24) continue;
        r += data[i];
        g += data[i+1];
        b += data[i+2];
        count++;
      }
      if(!count) return {r:145,g:85,b:255};
      return { r: r/count, g: g/count, b: b/count };
    }
    function setPosterTexture(img){
      const src = img.currentSrc || img.src;
      ambientPoster.style.backgroundImage = `url('${src}')`;
    }

    // ===== Render + modes =====
    let items = [];
    let currentMode = 'date';

    function posterEl(e, idx){
      const el = document.createElement(e.link ? 'a' : 'div');
      el.className = 'poster';
      el.dataset.key = String(idx);

      if(e.link){
        el.href = e.link;
        el.target = '_blank';
        el.rel = 'noopener';
      }

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.alt = e.title || '';
      img.src = e.image;

      el.appendChild(img);
      return el;
    }

    function updateActiveMode(mode){
      modeButtons.forEach(btn => btn.classList.toggle('isActive', btn.dataset.mode === mode));
    }

    function shuffleChildren(parent){
      const arr = Array.from(parent.children);
      for(let i=arr.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      arr.forEach(n => parent.appendChild(n));
    }

    function randomizeVars(){
      const posters = Array.from(grid.querySelectorAll('.poster'));
      posters.forEach((el) => {
        const tx  = (Math.random()*2 - 1) * 14;
        const ty  = (Math.random()*2 - 1) * 22;
        const rot = (Math.random()*2 - 1) * 1.6;
        const scl = 0.99 + Math.random()*0.05;
        const z   = 1 + Math.round(Math.random()*3);

        el.style.setProperty('--tx', tx.toFixed(1)+'px');
        el.style.setProperty('--ty', ty.toFixed(1)+'px');
        el.style.setProperty('--rot', rot.toFixed(2)+'deg');
        el.style.setProperty('--scl', scl.toFixed(3));
        el.style.setProperty('--z', z);
      });
    }

    function clearRandomVars(){
      const posters = Array.from(grid.querySelectorAll('.poster'));
      posters.forEach(el => {
        el.style.removeProperty('--tx');
        el.style.removeProperty('--ty');
        el.style.removeProperty('--rot');
        el.style.removeProperty('--scl');
        el.style.removeProperty('--z');
        el.style.removeProperty('--flipX');
        el.style.removeProperty('--flipY');
      });
    }

    function setPosterLinksEnabled(enabled){
      const posters = Array.from(grid.querySelectorAll('.poster'));
      posters.forEach(p => {
        if(p.tagName !== 'A') return;
        if(enabled){
          if(p.dataset.realHref){
            p.setAttribute('href', p.dataset.realHref);
            delete p.dataset.realHref;
          }
        } else {
          const h = p.getAttribute('href');
          if(h) p.dataset.realHref = h;
          p.removeAttribute('href');
        }
      });
    }

    function setMode(mode){
      // allow repeated clicks: random re-shuffle, date re-order
      if(mode === currentMode){
        if(mode === 'random'){
          shuffleChildren(grid);
          randomizeVars();
        } else {
          clearRandomVars();
          // enforce correct order by items index
          const posters = Array.from(grid.querySelectorAll('.poster'));
          const map = new Map(posters.map(p => [Number(p.dataset.key), p]));
          grid.innerHTML = '';
          items.forEach((_, idx) => { const el = map.get(idx); if(el) grid.appendChild(el); });
        }
        return;
      }

      currentMode = mode;
      grid.classList.toggle('randomMode', mode === 'random');
      updateActiveMode(mode);

      if(mode === 'random'){
        setPosterLinksEnabled(false);
        shuffleChildren(grid);
        randomizeVars();
      } else {
        setPosterLinksEnabled(true);
        clearRandomVars();
        const posters = Array.from(grid.querySelectorAll('.poster'));
        const map = new Map(posters.map(p => [Number(p.dataset.key), p]));
        grid.innerHTML = '';
        items.forEach((_, idx) => { const el = map.get(idx); if(el) grid.appendChild(el); });
      }
    }

    // ===== HERO (only in random mode) =====
    const heroOverlay = document.getElementById('heroOverlay');
    const heroCard = heroOverlay ? heroOverlay.querySelector('.heroCard') : null;
    let heroOpen = false;
    let heroFrom = null;
    let heroSrc = null;
    let heroJustOpenedAt = 0;

    function getPosterFromTarget(t){
      return (t && t.closest) ? t.closest('.poster') : null;
    }

    function openHero(posterEl){
      if(!heroOverlay || !heroCard) return;
      const img = posterEl.querySelector('img');
      if(!img) return;

      const rect = img.getBoundingClientRect();
      heroFrom = { left: rect.left, top: rect.top, width: rect.width, height: rect.height };
      heroSrc = img.currentSrc || img.src;

      heroOverlay.classList.add('isOpen');
      heroOverlay.setAttribute('aria-hidden', 'false');
      heroOpen = true;
      heroJustOpenedAt = (performance && performance.now) ? performance.now() : Date.now();

      heroCard.innerHTML = '';
      heroCard.classList.remove('unrolling','rollingUp');

      const wrap = document.createElement('div');
      wrap.className = 'rollWrap';
      const hi = document.createElement('img');
      hi.alt = img.alt || '';
      hi.src = heroSrc;
      wrap.style.transform = 'scaleY(0.02)';
      wrap.style.filter = 'blur(1.6px)';
      wrap.appendChild(hi);
      heroCard.appendChild(wrap);
      void wrap.offsetHeight;

      // start at original rect
      heroCard.style.left = heroFrom.left + 'px';
      heroCard.style.top = heroFrom.top + 'px';
      heroCard.style.width = heroFrom.width + 'px';
      heroCard.style.height = heroFrom.height + 'px';

      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const maxW = Math.min(vw - 32, 980);
      const maxH = Math.min(vh - 96, 900);
      const natW = img.naturalWidth || rect.width;
      const natH = img.naturalHeight || rect.height;
      const scale = Math.min(maxW / natW, maxH / natH, 1.0);
      const tW = Math.max(240, Math.round(natW * scale));
      const tH = Math.max(240, Math.round(natH * scale));
      const tL = Math.round((vw - tW) / 2);
      const tT = Math.round((vh - tH) / 2);

      heroCard.style.transition = 'none';
      requestAnimationFrame(() => {
        heroCard.style.transition =
          'left 360ms cubic-bezier(.2,.85,.2,1), top 360ms cubic-bezier(.2,.85,.2,1), width 360ms cubic-bezier(.2,.85,.2,1), height 360ms cubic-bezier(.2,.85,.2,1)';
        heroCard.style.left = tL + 'px';
        heroCard.style.top = tT + 'px';
        heroCard.style.width = tW + 'px';
        heroCard.style.height = tH + 'px';
        heroCard.classList.add('unrolling');
      });

      if(img.complete){
        setPosterTexture(img);
        getAverageColor(img).then(setAmbientTarget).catch(()=>{});
      }
    }

    function closeHero(){
      if(!heroOverlay || !heroCard || !heroOpen || !heroFrom) return;

      heroCard.classList.remove('unrolling');
      heroCard.classList.add('rollingUp');

      heroCard.style.transition =
        'left 260ms cubic-bezier(.2,.8,.2,1), top 260ms cubic-bezier(.2,.8,.2,1), width 260ms cubic-bezier(.2,.8,.2,1), height 260ms cubic-bezier(.2,.8,.2,1)';
      heroCard.style.left = heroFrom.left + 'px';
      heroCard.style.top = heroFrom.top + 'px';
      heroCard.style.width = heroFrom.width + 'px';
      heroCard.style.height = heroFrom.height + 'px';

      setTimeout(() => {
        heroOverlay.classList.remove('isOpen');
        heroOverlay.setAttribute('aria-hidden','true');
        heroCard.classList.remove('unrolling','rollingUp');
        heroCard.innerHTML = '';
        heroOpen = false;
        heroFrom = null;
        heroSrc = null;
        heroJustOpenedAt = 0;
      }, 280);
    }

    if(heroOverlay){
      heroOverlay.addEventListener('click', (e) => {
        const now = (performance && performance.now) ? performance.now() : Date.now();
        if(heroJustOpenedAt && (now - heroJustOpenedAt) < 380) return;

        const t = e.target;
        const isBackdrop = t && t.getAttribute && t.getAttribute('data-hero-close') === '1';
        const isCard = t && (t.closest && t.closest('.heroCard'));
        if(isBackdrop || isCard) closeHero();
      });
      window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeHero(); });
    }

    // ===== Ambient observer =====
    function setupAmbientObserver(){
      const imgs = Array.from(grid.querySelectorAll('img'));
      if(!imgs.length) return;

      imgs[0].addEventListener('load', async () => {
        setPosterTexture(imgs[0]);
        setAmbientTarget(await getAverageColor(imgs[0]));
      }, { once:true });

      const io = new IntersectionObserver(async (entries) => {
        const best = entries
          .filter(e => e.isIntersecting)
          .sort((a,b)=> b.intersectionRatio - a.intersectionRatio)[0];
        if(!best) return;

        const img = best.target;
        if(!img.complete) return;

        setPosterTexture(img);
        const rgb = await getAverageColor(img);
        setAmbientTarget(rgb);
      }, { threshold:[0.35,0.55,0.72] });

      imgs.forEach(img => {
        if(img.complete) io.observe(img);
        else img.addEventListener('load', () => io.observe(img), { once:true });
      });
    }

    // ===== Scroll: temporary disable rndm transforms =====
    (() => {
      const mq = window.matchMedia("(max-width: 768px)");
      let t = null;
      function onScroll(){
        if(!mq.matches) return;
        if(!grid.classList.contains('randomMode')) return;
        document.body.classList.add('isScrolling');
        clearTimeout(t);
        t = setTimeout(()=> document.body.classList.remove('isScrolling'), 170);
      }
      window.addEventListener('scroll', onScroll, { passive:true });
    })();

    async function init(){
      const res = await fetch(DATA_URL, { cache:'no-store' });
      if(!res.ok) throw new Error('Nejde načíst '+DATA_URL+' (status '+res.status+')');
      const all = await res.json();

      const today = new Date(); today.setHours(0,0,0,0);
      items = (all||[])
        .filter(e => e && e.date && e.image && parseDate(e.date) < today)
        .sort((a,b)=> parseDate(b.date) - parseDate(a.date));

      if(!items.length){
        grid.innerHTML = '<div class="err">V JSONu nejsou žádné minulé akce.</div>';
        return;
      }

      grid.innerHTML = '';
      items.forEach((e, idx) => grid.appendChild(posterEl(e, idx)));

      // posters -> HERO only in random mode
      let lastPointerUpAt = 0;

      function handleActivate(ev){
        const p = getPosterFromTarget(ev.target);
        if(!p) return;
        if(!grid.classList.contains('randomMode')) return;

        if(ev.cancelable) ev.preventDefault();
        ev.stopPropagation();

        const img = p.querySelector('img');
        const src = img ? (img.currentSrc || img.src) : null;

        if(heroOpen && src && src === heroSrc){ closeHero(); return; }
        openHero(p);
      }

      grid.addEventListener('pointerup', (ev) => {
        lastPointerUpAt = (performance && performance.now) ? performance.now() : Date.now();
        handleActivate(ev);
      }, { passive:false });

      grid.addEventListener('click', (ev) => {
        const now = (performance && performance.now) ? performance.now() : Date.now();
        if(grid.classList.contains('randomMode')){
          const p = getPosterFromTarget(ev.target);
          if(p){
            if(ev.cancelable) ev.preventDefault();
            ev.stopPropagation();
          }
        }
        if(now - lastPointerUpAt < 450) return;
        handleActivate(ev);
      }, { passive:false });

      // mode buttons
      modeButtons.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

      // default: date
      updateActiveMode('date');
      setPosterLinksEnabled(true);
      clearRandomVars();

      setupAmbientObserver();
      applyAmbient();
    }

    init().catch(err => {
      grid.innerHTML = '<div class="err">'+String(err.message || err)+'</div>';
    });
  </script>
<!-- ===== MERGE: portrait rndm anti-half from past-eventsl into past-events ===== -->
<style id="merge-portrait-rndm-anti-half">
@media (max-width: 560px) and (orientation: portrait){
  /* Keep desktop/date as-is; only affect portrait rndm. */
  #eventsGrid.randomMode .poster{
    transform: none !important;
    transition: none !important;
    will-change: auto !important;
    contain: paint;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  #eventsGrid.randomMode .poster img{
    display:block;
    width:100%;
    height:auto;
    transform: translateZ(0) rotate(var(--mrot, 0deg));
    transform-origin: 50% 50%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* During scroll: disable any rotation/transform on the IMG to avoid "half paints" */
  body.v21Scrolling #eventsGrid.randomMode .poster img{
    transform: none !important;
  }

  /* Prevent weird clipping on mobile */
  #eventsGrid.randomMode .poster,
  #eventsGrid.randomMode .poster img{
    clip-path: none !important;
    -webkit-mask-image: none !important;
    mask-image: none !important;
    overflow: visible !important;
  }

  /* Calm the heaviest ambient layers in portrait to reduce compositing glitches */
  #ambientPoster{
    mix-blend-mode: normal !important;
    opacity: .35 !important;
    filter: blur(44px) saturate(1.12) !important;
    animation: none !important;
  }
  #ambientGlow{
    opacity: .85 !important;
    animation: none !important;
  }
}
</style>
<script id="merge-portrait-rndm-anti-half-script">
(() => {
  const isTouch = (navigator.maxTouchPoints && navigator.maxTouchPoints > 0) || ('ontouchstart' in window);
  if (!isTouch) return;

  const mq = window.matchMedia("(max-width: 560px) and (orientation: portrait)");
  const grid = document.getElementById("eventsGrid");
  if (!grid) return;

  // 1) Add v21Scrolling class while the user is actively scrolling (portrait rndm only)
  let t = null;
  function onScroll(){
    if (!mq.matches) return;
    if (!grid.classList.contains("randomMode")) return;

    document.body.classList.add("v21Scrolling");
    clearTimeout(t);
    t = setTimeout(() => document.body.classList.remove("v21Scrolling"), 170);
  }
  window.addEventListener("scroll", onScroll, { passive:true });

  // 2) Prefer full decode to reduce partial paints
  async function decodeVisible(){
    if (!mq.matches) return;
    if (!grid.classList.contains("randomMode")) return;

    const vh = window.innerHeight || document.documentElement.clientHeight;
    const imgs = Array.from(grid.querySelectorAll(".poster img")).filter(img => {
      const r = img.getBoundingClientRect();
      return r.bottom > -200 && r.top < vh + 200;
    });

    for (const img of imgs){
      try{
        img.loading = "eager";
        img.decoding = "sync";
        if (!img.complete){
          await Promise.race([
            new Promise(res => img.addEventListener("load", res, { once:true })),
            new Promise(res => setTimeout(res, 250))
          ]);
        }
        if (img.decode) await img.decode();
      }catch(e){}
    }
  }

  // run after scroll settles
  let dt = null;
  window.addEventListener("scroll", () => {
    if (!mq.matches || !grid.classList.contains("randomMode")) return;
    clearTimeout(dt);
    dt = setTimeout(decodeVisible, 180);
  }, { passive:true });

})();
</script>

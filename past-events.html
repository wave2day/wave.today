<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Top bar — pills + buttons</title>

  <style>
    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0;
      background:#0b0b10;
      color:#eef0ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x:hidden;
    }
    a,button{ -webkit-tap-highlight-color: transparent; }
    a:focus, a:focus-visible, button:focus, button:focus-visible{ outline: none !important; box-shadow:none !important; }

    /* ===== Layout ===== */
    .topBar{
      position: fixed;
      top: 0;
      left: 0; right: 0;
      z-index: 20;
      width: min(1180px, calc(100vw - 36px));
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 12px) 0 16px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 14px;
    }
    .rightGroup{
      display:flex;
      gap:12px;
      align-items:center;
      margin-left:auto;
    }

    /* ===== Shared glass engine (sjednocené pro pill i round) ===== */
    :root{
      --outer: 190px;
      --innerRatio: .65;
      --ring: 13px;
      --rimBlur: 1.05px;

      --glassClearA: rgba(255,255,255,.14);
      --glassClearB: rgba(255,255,255,.08);
      --glassMilkA:  rgba(255,255,255,.10);
      --glassMilkB:  rgba(255,255,255,.12);

      --topRim1: rgba(0,0,0,.28);
      --topRim2: rgba(0,0,0,.12);
      --topRimFade: 30%;

      --botRim1: rgba(255,255,255,.74);
      --botRim2: rgba(255,255,255,.30);

      --bleedA: .14;
      --bleedB: .07;

      --pressY: 3px;
      --pressIn: 110ms;
      --pressOut: 190ms;

      --textColor: rgba(255,255,255,.92);
      --textSize: 34px;
      --textScaleX: 1.10;
      --textWidth: 92%;

      --stroke: rgba(0,0,0,.34);
      --depth1: rgba(0,0,0,.30);
      --depth2: rgba(0,0,0,.18);
      --lacquer: rgba(255,255,255,.28);

      /* Blue theme (v-blue) */
      --c1:#6f7ed0; --c2:#5462bb; --c3:#4a57ae;
      --rimTint: 120, 155, 255;
      --bleedX: 76%;
      --bleedY: 84%;
    }

    .wtBarRow{
      display:flex;
      align-items:center;
      gap:12px;
    }

    /* Base glass shell */
    .wtGlass{
      width: var(--outer);
      height: var(--outer);
      border-radius: 50%;
      position: relative;
      display:grid;
      place-items:center;
      isolation:isolate;

      background:
        radial-gradient(120% 120% at 50% 60%, var(--glassMilkA), transparent 62%),
        radial-gradient(120% 120% at 50% 92%, var(--glassMilkB), transparent 58%),
        radial-gradient(120% 120% at 35% 25%, var(--glassClearA), transparent 55%),
        radial-gradient(140% 140% at 65% 70%, var(--glassClearB), transparent 60%),
        rgba(255,255,255,.08);

      box-shadow:
        inset 0 18px 26px rgba(0,0,0,.24),
        inset 0 -22px 30px rgba(255,255,255,.22),
        0 22px 44px rgba(0,0,0,.18);

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      transition: filter var(--pressOut) ease;
      transform-origin: left center;
    }

    .wtGlass::before{
      content:"";
      position:absolute;
      inset: 10px;
      border-radius: inherit;
      pointer-events:none;
      z-index:1;
      background:
        radial-gradient(75% 60% at 18% 22%,
          rgba(255,255,255,.42) 0%,
          rgba(255,255,255,.18) 35%,
          transparent 72%),
        radial-gradient(55% 45% at 28% 32%,
          rgba(255,255,255,.18) 0%,
          transparent 72%);
      filter: blur(1.35px);
      opacity:.90;
    }

    .wtGlass::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius: inherit;
      pointer-events:none;
      z-index:2;

      background:
        radial-gradient(72% 60% at var(--bleedX) var(--bleedY),
          rgba(var(--rimTint), var(--bleedA)) 0%,
          rgba(var(--rimTint), var(--bleedB)) 28%,
          transparent 68%),

        conic-gradient(from 210deg,
          transparent 0 18%,
          rgba(var(--rimTint), .12) 22%,
          transparent 36%,
          rgba(var(--rimTint), .06) 46%,
          transparent 62%,
          rgba(var(--rimTint), .045) 70%,
          transparent 100%),

        radial-gradient(140% 120% at 50% 120%,
          var(--botRim1) 0%,
          var(--botRim2) 22%,
          transparent 52%),

        radial-gradient(170% 120% at 50% -38%,
          var(--topRim1) 0%,
          var(--topRim2) 14%,
          transparent var(--topRimFade));

      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;

      padding: var(--ring);
      filter: blur(var(--rimBlur));
      opacity:.95;
    }

    .pressGlow{
      position:absolute;
      inset:-22px;
      border-radius: 999px;
      pointer-events:none;
      opacity:0;
      filter: blur(10px);
      transition: opacity var(--pressOut) ease, transform var(--pressOut) ease;
      transform: scale(0.995);
      z-index:0;
      background:
        radial-gradient(80% 80% at 70% 70%,
          rgba(var(--rimTint), .18) 0%,
          rgba(var(--rimTint), .10) 26%,
          transparent 62%),
        radial-gradient(100% 90% at 50% 110%,
          rgba(255,255,255,.20) 0%,
          transparent 55%);
    }

    /* Core button/link */
    .wtCore{
      --cw: calc(var(--outer) * var(--innerRatio));
      --ch: calc(var(--outer) * var(--innerRatio));

      width: var(--cw);
      height: var(--ch);
      border-radius: 999px;

      position:relative;
      z-index:3;
      border:0;
      padding:0;

      cursor:pointer;
      user-select:none;
      text-decoration:none;

      display:grid;
      place-items:center;

      background:
        radial-gradient(120% 120% at 35% 25%, rgba(255,255,255,.16), transparent 55%),
        linear-gradient(180deg, var(--c1), var(--c2) 55%, var(--c3));

      box-shadow:
        0 18px 26px rgba(0,0,0,.18),
        inset 0 16px 22px rgba(0,0,0,.13),
        inset 0 -14px 20px rgba(255,255,255,.14);

      transform: translateY(0);
      transition:
        transform var(--pressOut) cubic-bezier(.2,.8,.2,1),
        box-shadow var(--pressOut) ease,
        filter var(--pressOut) ease;
    }

    /* Press interaction (sjednocené) */
    .wtGlass:has(.wtCore:active){ filter: brightness(.985); transition: filter var(--pressIn) ease; }
    .wtGlass:has(.wtCore:active) .pressGlow{ opacity:1; transform: scale(1.01); transition: opacity var(--pressIn) ease, transform var(--pressIn) ease; }
    .wtCore:active{
      transform: translateY(var(--pressY));
      transition:
        transform var(--pressIn) cubic-bezier(.2,.8,.2,1),
        box-shadow var(--pressIn) ease,
        filter var(--pressIn) ease;
      box-shadow:
        0 10px 18px rgba(0,0,0,.16),
        inset 0 20px 26px rgba(0,0,0,.18),
        inset 0 -10px 16px rgba(255,255,255,.10);
      filter: brightness(.99) saturate(.98);
    }

    /* Label text */
    .wtText{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;

      width: var(--textWidth);
      margin: 0 auto;

      color: var(--textColor);
      font-weight: 760;
      font-size: var(--textSize);
      letter-spacing: .40px;
      line-height: 1;
      text-transform: lowercase;

      transform: scaleX(var(--textScaleX));
      transform-origin: center;

      text-shadow:
        -0.75px 0      0 var(--stroke),
         0.75px 0      0 var(--stroke),
         0      -0.75px 0 var(--stroke),
         0       0.75px 0 var(--stroke),
        -0.55px -0.55px 0 var(--stroke),
         0.55px -0.55px 0 var(--stroke),
        -0.55px  0.55px 0 var(--stroke),
         0.55px  0.55px 0 var(--stroke),
        0 -0.55px 0 var(--lacquer),
        0  1.25px 1.45px var(--depth1),
        0  3px    8px    var(--depth2);
    }

    /* ===== Pill variant (jen šířka) ===== */
    .wtGlass.isPill{
      width: 440px;              /* původní pillW */
      border-radius: 999px;
      transform-origin: left center;
    }
    .wtGlass.isPill::before,
    .wtGlass.isPill::after,
    .wtGlass.isPill .pressGlow{
      border-radius: 999px;
    }
    .wtGlass.isPill .wtCore{
      width: calc(440px - (2 * (var(--outer) * (1 - var(--innerRatio)) / 2)));
      height: calc(var(--outer) * var(--innerRatio));
      border-radius: 999px;
    }

    /* ===== Scaling in top bar (stejné chování jako dřív) ===== */
    .scalePill{ zoom: .253; }
    .scaleRound{ zoom: .235; }
    @supports not (zoom: 1){
      .scalePill{ zoom:1; transform: scale(.253); transform-origin:left center; }
      .scaleRound{ zoom:1; transform: scale(.235); transform-origin:center; }
    }

    /* ===== Active state (jen logický, žádná vizuální magie navíc) ===== */
    .wtModeBtn{ display:flex; align-items:center; }
    .wtModeBtn.isActive{ filter: saturate(1.06) brightness(1.03); }

    /* Page placeholder */
    .page{
      min-height: 100vh;
      padding: 160px 18px 90px;
    }
    .hint{
      opacity:.85;
      max-width: 980px;
      margin: 0 auto;
      line-height: 1.4;
      font-weight: 650;
      letter-spacing:.2px;
    }
  
    /* ===== FIX: date/rndm text must be black (like original) ===== */
    #wtModes .wtText{
      color: rgba(0,0,0,.92);
      text-shadow: none;
      font-size: calc(var(--textSize) * 1.08);
    }

  
    /* ===== DESKTOP: ambient + grid + hero ===== */
    #pageBase{ position:fixed; inset:0; z-index:0; background:#0b0b10; pointer-events:none; }
    #ambientBg{
      position:fixed; inset:0; z-index:1; pointer-events:none;
      --ambR:145; --ambG:85; --ambB:255;
      background:
        radial-gradient(1100px 720px at 52% 16%, rgba(var(--ambR),var(--ambG),var(--ambB),.30), transparent 62%),
        radial-gradient(820px 520px at 18% 62%, rgba(80,150,255,.18), transparent 60%),
        radial-gradient(820px 520px at 86% 70%, rgba(255,70,205,.14), transparent 60%),
        linear-gradient(180deg, #0b0b10, #0b0b10);
      transition: filter .35s ease, background .45s ease;
      will-change: transform, opacity, filter;
    }
    #ambientPoster{
      position:fixed; inset:-14vh; z-index:2; pointer-events:none;
      background:none; background-size:cover; background-position:center;
      filter: blur(86px) saturate(1.15);
      opacity:.88; transform: scale(1.06);
      mix-blend-mode: screen;
      transition: background-image .55s ease, opacity .55s ease;
      will-change: transform, opacity, filter;
      animation: wtAmbientDrift 8.5s ease-in-out infinite;
    }
    #ambientGlow{
      position:fixed; inset:-12vh; z-index:3; pointer-events:none;
      background: radial-gradient(circle at 50% 45%, rgba(120,150,255,.35), transparent 58%);
      filter: blur(20px) saturate(1.25);
      mix-blend-mode: screen;
      opacity:1;
      transition: background .55s ease, opacity .55s ease;
      will-change: transform, opacity, filter;
      animation: wtAmbientDrift 7.2s ease-in-out infinite reverse;
    }
    @keyframes wtAmbientDrift{
      0%{ transform: translate3d(0,0,0) scale(1.02); filter: blur(18px) saturate(1.25); }
      50%{ transform: translate3d(1.5vw,-1.2vh,0) scale(1.04); filter: blur(20px) saturate(1.35); }
      100%{ transform: translate3d(0,0,0) scale(1.02); filter: blur(18px) saturate(1.25); }
    }

    .glassPage{
      position: relative;
      z-index: 10;
      padding: 120px 0 42px; /* space for fixed topBar */
      background: rgba(255,255,255,.026);
      backdrop-filter: blur(8px) saturate(1.05);
      -webkit-backdrop-filter: blur(8px) saturate(1.05);
      isolation:isolate;
    }

    #eventsGrid{
      max-width: 980px;
      margin: 0 auto;
      display:flex;
      flex-direction: column;
      align-items:center;
      gap: 26px;
      padding-top: 10px;
    }
    .poster{
      width: min(calc(100vw - 36px), 620px);
      margin: 0 auto;
      border-radius: 0 !important;
      overflow: visible !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      transition: transform 520ms cubic-bezier(.2,.8,.2,1);
    }
    .poster img{
      width:100%;
      height:auto;
      display:block;
      border-radius: 0 !important;
    }

    #eventsGrid.randomMode{
      /* masonry-like layout (3 columns on desktop) */
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 18px;
      column-count: 3;
      column-gap: 14px;
    }
    #eventsGrid.randomMode .poster{
      /* column item */
      display: inline-block;
      width: 100%;
      margin: 0 0 14px 0;
      max-width: 440px;
      position: relative;
      transform:
        translate(var(--flipX,0px), var(--flipY,0px))
        translate(var(--tx,0px), var(--ty,0px))
        rotate(var(--rot,0deg))
        scale(var(--scl, 1));
      z-index: var(--z, 1);
      break-inside: avoid;
      -webkit-column-break-inside: avoid;
      page-break-inside: avoid;
    }

    /* hero overlay */
    #heroOverlay{
      cursor: zoom-out;

      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    #heroOverlay.isOpen{ display:flex; }
    #heroOverlay .heroBack{ z-index: 1; position:absolute; inset:0; background: rgba(0,0,0,.22); }
    #heroOverlay .heroCard{ z-index: 2;
      position: fixed;
      inset:0;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background: transparent;
    }
    #heroOverlay .rollWrap{ position:absolute; inset:0; transform-origin: top; transform: scaleY(1); }
    #heroOverlay .rollWrap img{ width:100%; height:100%; object-fit: contain; display:block; }

    @keyframes unrollPoster{
      0%   { transform: scaleY(0.02); filter: blur(1.6px); }
      55%  { transform: scaleY(1.02); filter: blur(.2px); }
      100% { transform: scaleY(1); filter: blur(0); }
    }
    @keyframes rollUpPoster{
      0%   { transform: scaleY(1); filter: blur(0); }
      100% { transform: scaleY(0.02); filter: blur(1.6px); }
    }
    #heroOverlay .heroCard.unrolling .rollWrap{ animation: unrollPoster 520ms cubic-bezier(.16,.9,.18,1) both; }
    #heroOverlay .heroCard.rollingUp .rollWrap{ animation: rollUpPoster 260ms cubic-bezier(.2,.8,.2,1) both; }

    .err{ max-width: 980px; margin: 0 auto; padding: 16px 18px; font-weight: 700; opacity: .9; }

  </style>



<style id="masonryPatch">
/* ===== Masonry (CSS columns) + zachování „random“ kouzla bez ořezu =====
   Princip:
   - samotný .poster je jen „nosná“ krabička pro columns (bez transformu)
   - transform (rotace/posun/scale) se aplikuje na IMG uvnitř
   - .poster dostane padding jako bezpečný „buffer“, aby se nic neřízlo
*/
#eventsGrid.randomMode{
  display: block !important;
  column-width: 280px;
  column-gap: 14px;
  column-fill: balance;
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 18px;
  overflow: visible !important;
}

#eventsGrid.randomMode .poster{
  display: block !important;
  width: 100% !important;
  max-width: none !important;
  margin: 0 0 14px !important;
  break-inside: avoid;
  page-break-inside: avoid;
  overflow: visible !important;

  /* buffer proti „useknutí“ při rotaci/posunu */
  padding: 12px;
  box-sizing: border-box;

  /* z-index proměnná zůstane, ale v columns je omezený – necháme jen kvůli konzistenci */
  position: relative;
}

/* zachovat transformy, ale přesunout je z .poster na img */
#eventsGrid.randomMode .poster{
  transform: none !important;
  transition: none !important;
}

#eventsGrid.randomMode .poster img{
  display: block;
  width: 100%;
  height: auto;

  /* původní random transformy (vars jsou na .poster a dědí se) */
  transform:
    translate(var(--flipX,0px), var(--flipY,0px))
    translate(var(--tx,0px), var(--ty,0px))
    rotate(var(--rot,0deg))
    scale(var(--scl, 1));
  transition: transform 520ms cubic-bezier(.2,.8,.2,1);
  transform-origin: 50% 50%;
  will-change: transform;
}

/* mobil: menší buffer */
@media (max-width: 560px){
  #eventsGrid.randomMode{ padding: 0 12px; }
  #eventsGrid.randomMode .poster{ padding: 10px; }
}
@media (max-width: 420px){
  #eventsGrid.randomMode{ padding: 0 8px; }
  #eventsGrid.randomMode .poster{ padding: 8px; }
}
</style>

<style id="force2colTouch">

/* ===== TOUCH rndm ONLY: force 2 columns (no overlay) ===== */
html.isTouch #eventsGrid.randomMode.force2col {
  display: grid !important;
  grid-template-columns: 1fr 1fr !important;
  gap: 12px 10px !important;
  padding: 0 8px !important;
  align-items: start !important;
  justify-items: stretch !important;
}
html.isTouch #eventsGrid.randomMode.force2col > * { min-width: 0 !important; }

/* Stop Android compositor glitch: no transforms on card boxes */
html.isTouch #eventsGrid.randomMode.force2col .poster{
  transform: none !important;
  transition: none !important;
  will-change: auto !important;
  contain: none !important;
  overflow: visible !important;
}

/* Keep slight "random" feel safely */
html.isTouch #eventsGrid.randomMode.force2col .poster img{
  backface-visibility: hidden !important;
  transform-origin: 50% 50% !important;
  transform: translateZ(0) rotate(var(--mrot, 0deg)) !important;
}
html.isTouch #eventsGrid.randomMode.force2col .poster:nth-child(6n+1){ --mrot: -0.9deg; }
html.isTouch #eventsGrid.randomMode.force2col .poster:nth-child(6n+2){ --mrot:  0.7deg; }
html.isTouch #eventsGrid.randomMode.force2col .poster:nth-child(6n+3){ --mrot: -0.5deg; }
html.isTouch #eventsGrid.randomMode.force2col .poster:nth-child(6n+4){ --mrot:  0.8deg; }
html.isTouch #eventsGrid.randomMode.force2col .poster:nth-child(6n+5){ --mrot: -0.6deg; }
html.isTouch #eventsGrid.randomMode.force2col .poster:nth-child(6n+6){ --mrot:  0.4deg; }

/* repaint nudge helper (no visible label) */
html.isTouch #eventsGrid.randomMode.force2col.paintNudge { opacity: 0.999; }

</style>

<style id="v20-mobile-rndm-noclip">
@media (max-width: 768px){
  /* Only affect mobile rndm */
  #eventsGrid.randomMode .poster,
  #eventsGrid.randomMode .poster *{
    overflow: visible !important;
    clip-path: none !important;
    -webkit-clip-path: none !important;
    mask: none !important;
    -webkit-mask: none !important;
  }

  #eventsGrid.randomMode .poster{
    height: auto !important;
    max-height: none !important;
  }

  #eventsGrid.randomMode .poster img{
    display: block !important;
    width: 100% !important;
    height: auto !important;
    max-height: none !important;
    object-fit: contain !important;
  }
}
</style>

<style id="v21-mobile-rndm-scroll-nohalf">
@media (max-width: 768px){
  /* Only mobile rndm */
  #eventsGrid.randomMode .poster img{
    transform-origin: 50% 50% !important;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* During scroll: temporarily remove rotations to avoid partial paint tiles */
  body.v21Scrolling #eventsGrid.randomMode .poster img{
    transform: none !important;
  }
}
</style>

</head>

<body>
  <div class="topBar">
    <!-- MAIN PAGE pill -->
    <div class="wtBarRow" aria-label="Main page">
      <div class="wtGlass isPill scalePill" id="mainPill">
        <div class="pressGlow"></div>
        <a class="wtCore" href="index.html" aria-label="Main page" draggable="false">
          <span class="wtText">main page</span>
        </a>
      </div>
    </div>

    <!-- MODE buttons -->
    <div class="rightGroup">
      <div id="wtModes" class="wtBarRow" aria-label="Řazení">
        <div class="wtModeBtn isActive" data-mode="date" aria-label="Řazení podle data">
          <div class="wtGlass scaleRound">
            <div class="pressGlow"></div>
            <button class="wtCore" type="button" aria-label="date">
              <span class="wtText">date</span>
            </button>
          </div>
        </div>

        <div class="wtModeBtn" data-mode="random" aria-label="Náhodné rozložení">
          <div class="wtGlass scaleRound">
            <div class="pressGlow"></div>
            <button class="wtCore" type="button" aria-label="rndm">
              <span class="wtText">rndm</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- jen aby bylo vidět, že topbar sedí a stránka žije -->

  <!-- ===== DESKTOP: ambient + grid + hero ===== -->
  <div id="pageBase" aria-hidden="true"></div>
  <div id="ambientBg" aria-hidden="true"></div>
  <div id="ambientPoster" aria-hidden="true"></div>
  <div id="ambientGlow" aria-hidden="true"></div>

  <div class="glassPage">
    <div id="eventsGrid" aria-label="Seznam plakátů"></div>
  </div>

  <div id="heroOverlay" aria-hidden="true">
    <div class="heroBack" data-hero-close="1"></div>
    <div class="heroCard" role="dialog" aria-modal="true"></div>
  </div>


  
  <script>
    (function(){
      // block long-press menu only on topBar
      const topBar = document.querySelector('.topBar');
      if(topBar){
        topBar.addEventListener('contextmenu', (e)=> e.preventDefault(), {capture:true});
        topBar.addEventListener('selectstart', (e)=> e.preventDefault(), {capture:true});
        topBar.addEventListener('dragstart', (e)=> e.preventDefault(), {capture:true});
      }

      const DATA_URL = 'data/events.json';

      const grid = document.getElementById('eventsGrid');
      const ambient = document.getElementById('ambientBg');
      const ambientGlow = document.getElementById('ambientGlow');
      const ambientPoster = document.getElementById('ambientPoster');

      const modeButtons = Array.from(document.querySelectorAll('#wtModes .wtModeBtn'));

      const heroOverlay = document.getElementById('heroOverlay');
      const heroCard = heroOverlay ? heroOverlay.querySelector('.heroCard') : null;

      if(!grid || !ambient || !ambientGlow || !ambientPoster || !heroOverlay || !heroCard){
        console.error('[past] missing required DOM nodes', {grid, ambient, ambientGlow, ambientPoster, heroOverlay, heroCard});
        return;
      }

      function parseDate(s){
        const [y,m,d] = String(s||'').split('-').map(Number);
        return new Date(y||1970, (m||1)-1, d||1, 12, 0, 0);
      }

      // ===== Ambient color tween =====
      let ambCurrent = { r:145, g:85, b:255 };
      let ambTarget  = { r:145, g:85, b:255 };
      let ambRAF = 0;

      function applyAmbient(){
        const r = Math.round(ambCurrent.r);
        const g = Math.round(ambCurrent.g);
        const b = Math.round(ambCurrent.b);

        ambient.style.setProperty('--ambR', r);
        ambient.style.setProperty('--ambG', g);
        ambient.style.setProperty('--ambB', b);

        ambientGlow.style.background =
          `radial-gradient(circle at 50% 42%, rgba(${r},${g},${b},.38), transparent 58%)`;
      }

      function tickAmbient(){
        ambCurrent.r += (ambTarget.r - ambCurrent.r) * 0.08;
        ambCurrent.g += (ambTarget.g - ambCurrent.g) * 0.08;
        ambCurrent.b += (ambTarget.b - ambCurrent.b) * 0.08;
        applyAmbient();
        ambRAF = requestAnimationFrame(tickAmbient);
      }

      function setAmbientTarget(rgb){
        ambTarget = rgb || { r:145, g:85, b:255 };
        if(!ambRAF) ambRAF = requestAnimationFrame(tickAmbient);
      }

      async function getAvgRGB(imgUrl){
        return new Promise((resolve)=>{
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            try{
              const c = document.createElement('canvas');
              const ctx = c.getContext('2d', { willReadFrequently: true });
              const w = 32, h = 32;
              c.width = w; c.height = h;
              ctx.drawImage(img, 0, 0, w, h);
              const data = ctx.getImageData(0,0,w,h).data;
              let r=0,g=0,b=0,n=0;
              for(let i=0;i<data.length;i+=4){
                const a = data[i+3];
                if(a < 32) continue;
                r += data[i]; g += data[i+1]; b += data[i+2];
                n++;
              }
              if(!n) return resolve({r:145,g:85,b:255});
              resolve({ r: r/n, g: g/n, b: b/n });
            }catch(e){
              resolve({r:145,g:85,b:255});
            }
          };
          img.onerror = ()=> resolve({r:145,g:85,b:255});
          img.src = imgUrl;
        });
      }

      // ===== HERO overlay =====
      let heroOpen = false;

      function openHero(src){
        if(heroOpen) return;
        heroOpen = true;

        heroOverlay.classList.add('isOpen');
        heroOverlay.setAttribute('aria-hidden','false');

        heroCard.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'rollWrap';

        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        wrap.appendChild(img);
        heroCard.appendChild(wrap);

        heroCard.classList.remove('rollingUp');
        heroCard.classList.add('unrolling');
        setTimeout(()=> heroCard.classList.remove('unrolling'), 560);
      }

      function closeHero(){
        if(!heroOpen) return;

        heroCard.classList.remove('unrolling');
        heroCard.classList.add('rollingUp');

        setTimeout(()=>{
          heroOpen = false;
          heroOverlay.classList.remove('isOpen');
          heroOverlay.setAttribute('aria-hidden','true');
          heroCard.classList.remove('rollingUp');
          heroCard.innerHTML = '';
        }, 280);
      }

      // close by clicking anywhere in overlay (includes poster)
      heroOverlay.addEventListener('click', ()=> closeHero());
      document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeHero(); });

      // ===== Render / modes =====
      let items = [];
      let currentMode = 'date';

      function updateActiveMode(mode){
        modeButtons.forEach(btn => btn.classList.toggle('isActive', btn.dataset.mode === mode));
      }

      function setPosterLinksEnabled(enabled){
        const posters = Array.from(grid.querySelectorAll('.poster'));
        posters.forEach(p => {
          if(p.tagName !== 'A') return;
          if(enabled){
            if(p.dataset.realHref){
              p.setAttribute('href', p.dataset.realHref);
              delete p.dataset.realHref;
            }
          }else{
            const h = p.getAttribute('href');
            if(h) p.dataset.realHref = h;
            p.removeAttribute('href');
          }
        });
      }

      function shufflePosters(){
        const posters = Array.from(grid.querySelectorAll('.poster'));
        for(let i=posters.length-1;i>0;i--){
          const j = (Math.random()*(i+1))|0;
          grid.insertBefore(posters[j], posters[i]);
          [posters[i], posters[j]] = [posters[j], posters[i]];
        }
      }

      function randomizeVars(){
        Array.from(grid.querySelectorAll('.poster')).forEach((el) => {
          const tx  = (Math.random()*2 - 1) * 14;
          const ty  = (Math.random()*2 - 1) * 22;
          const rot = (Math.random()*2 - 1) * 1.6;
          const scl = 0.99 + Math.random()*0.05;
          const z   = 1 + Math.round(Math.random()*3);

          el.style.setProperty('--tx', tx.toFixed(1)+'px');
          el.style.setProperty('--ty', ty.toFixed(1)+'px');
          el.style.setProperty('--rot', rot.toFixed(2)+'deg');
          el.style.setProperty('--scl', scl.toFixed(3));
          el.style.setProperty('--z', z);
        });
      }

      function clearRandomVars(){
        Array.from(grid.querySelectorAll('.poster')).forEach(el => {
          el.style.removeProperty('--tx');
          el.style.removeProperty('--ty');
          el.style.removeProperty('--rot');
          el.style.removeProperty('--scl');
          el.style.removeProperty('--z');
        });
      }

      async function setAmbientFromImg(src){
        if(!src) return;
        ambientPoster.style.backgroundImage = `url('${src}')`;
        const rgb = await getAvgRGB(src);
        setAmbientTarget(rgb);
      }

      function makePoster(item, idx){
        const a = document.createElement('a');
        a.className = 'poster';
        a.dataset.key = String(idx);
        a.href = item.link || item.href || '#';

        const img = document.createElement('img');
        img.loading = 'lazy';
        img.decoding = 'async';
        img.src = item.image || item.img || item.poster || '';
        img.alt = item.title || '';
        a.appendChild(img);

        // ambient updates on hover/focus always
        const prime = ()=> { if(img.src) setAmbientFromImg(img.src); };
        a.addEventListener('mouseenter', prime);
        a.addEventListener('focus', prime);

        // in random mode posters open hero (href removed)
        function activate(ev){
          if(a.getAttribute('href')) return; // date mode -> normal link
          ev.preventDefault();
          ev.stopPropagation();
          if(img.src) openHero(img.src);
        }
        a.addEventListener('click', activate);
        a.addEventListener('pointerup', (ev)=> activate(ev), { passive:false });

        return a;
      }

      function restoreOrder(){
        const posters = Array.from(grid.querySelectorAll('.poster'));
        const map = new Map();
        posters.forEach(p => map.set(Number(p.dataset.key), p));
        grid.innerHTML = '';
        items.forEach((_, idx) => {
          const el = map.get(idx);
          if(el) grid.appendChild(el);
        });
      }

      function setMode(mode){
        if(mode === currentMode){
          if(mode === 'random'){ shufflePosters(); randomizeVars(); }
          return;
        }

        currentMode = mode;
        grid.classList.toggle('randomMode', mode === 'random');
        updateActiveMode(mode);

        setPosterLinksEnabled(mode !== 'random');

        if(mode === 'random'){
          shufflePosters();
          randomizeVars();
        }else{
          clearRandomVars();
          restoreOrder();
        }
      }

      async function init(){
        const res = await fetch(DATA_URL, { cache: 'no-store' });
        if(!res.ok) throw new Error('Failed to load '+DATA_URL);

        const raw = await res.json();
        const arr = Array.isArray(raw) ? raw : (raw.events || raw.items || []);
        items = arr
          .map(it => ({ ...it, _date: parseDate(it.date || it.when || it.day) }))
          .sort((a,b)=> b._date - a._date);

        grid.innerHTML = '';
        items.forEach((it, idx) => grid.appendChild(makePoster(it, idx)));

        // buttons
        modeButtons.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

        // default: date
        updateActiveMode('date');
        setPosterLinksEnabled(true);
        clearRandomVars();
        applyAmbient();

        // IMPORTANT: ambient should be visible even before first hover
        const firstImg = grid.querySelector('.poster img');
        if(firstImg && firstImg.getAttribute('src')){
          setAmbientFromImg(firstImg.getAttribute('src'));
        }

        // fallback when leaving the grid
        grid.addEventListener('mouseleave', ()=>{
          // keep last poster texture; only soften color back slightly
          setAmbientTarget({r:145,g:85,b:255});
        });
      }

      init().catch(err => {
        console.error(err);
        grid.innerHTML = '<div class="err">'+String(err.message || err)+'</div>';
      });
    })();
  </script>


<script id="v21-mobile-rndm-scroll-nohalf-script">

<script>
  const DATA_URL = 'data/events.json';

  const grid = document.getElementById('eventsGrid');
  const ambient = document.getElementById('ambientBg');
  const ambientGlow = document.getElementById('ambientGlow');
  const ambientPoster = document.getElementById('ambientPoster');

  const modeButtons = Array.from(document.querySelectorAll('#wtModes .wtModeBtn'));

  // --- helpers
  const clamp = (n,a,b)=> Math.max(a, Math.min(b,n));
  function parseDate(s){
    const [y,m,d] = String(s||'').split('-').map(Number);
    return new Date(y||1970, (m||1)-1, d||1, 12, 0, 0);
  }

  // --- ambient: use averaged color (smoothly), poster image only as very subtle texture
  let ambCurrent = { r:145, g:85, b:255 };
  let ambTarget  = { r:145, g:85, b:255 };
  let ambRAF = 0;

  function applyAmbient(){
    const r = Math.round(ambCurrent.r);
    const g = Math.round(ambCurrent.g);
    const b = Math.round(ambCurrent.b);

    // CSS-var based purple base + poster-derived color.
    ambient.style.setProperty('--ambR', r);
    ambient.style.setProperty('--ambG', g);
    ambient.style.setProperty('--ambB', b);

    ambientGlow.style.background =
      `radial-gradient(circle at 50% 42%, rgba(${r},${g},${b},.38), transparent 58%)`;
  }

  function tickAmbient(){
    // critically damped-ish easing to avoid "skákání"
    ambCurrent.r += (ambTarget.r - ambCurrent.r) * 0.10;
    ambCurrent.g += (ambTarget.g - ambCurrent.g) * 0.10;
    ambCurrent.b += (ambTarget.b - ambCurrent.b) * 0.10;

    applyAmbient();

    const dr = Math.abs(ambTarget.r - ambCurrent.r);
    const dg = Math.abs(ambTarget.g - ambCurrent.g);
    const db = Math.abs(ambTarget.b - ambCurrent.b);
    if (dr + dg + db > 0.8){
      ambRAF = requestAnimationFrame(tickAmbient);
    } else {
      ambRAF = 0;
    }
  }

  function setAmbientTarget(rgb){
    ambTarget = {
      r: clamp(rgb.r, 0, 255),
      g: clamp(rgb.g, 0, 255),
      b: clamp(rgb.b, 0, 255),
    };
    if(!ambRAF) ambRAF = requestAnimationFrame(tickAmbient);
  }

  async function getAverageColor(img){
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d', { willReadFrequently:true });
    const w = 42, h = 42;
    c.width = w; c.height = h;

    ctx.drawImage(img, 0, 0, w, h);
    const data = ctx.getImageData(0,0,w,h).data;

    let r=0,g=0,b=0,count=0;
    for(let i=0;i<data.length;i+=4){
      const a = data[i+3];
      if(a < 24) continue;
      r += data[i];
      g += data[i+1];
      b += data[i+2];
      count++;
    }
    if(!count) return {r:145,g:85,b:255};
    return { r: r/count, g: g/count, b: b/count };
  }

  // very subtle poster texture (optional, not "viditelný plakát")
  function setPosterTexture(img){
    const src = img.currentSrc || img.src;
    ambientPoster.style.backgroundImage = `url('${src}')`;
  }

  // --- render
  let items = [];
  let currentMode = 'date';
  let observer = null;

  function posterEl(e, idx){
    const a = document.createElement(e.link ? 'a' : 'div');
    a.className = 'poster';
    a.dataset.key = String(idx);
    if(e.link) {
      a.href = e.link;
      a.target = '_blank';
      a.rel = 'noopener';
      // (no posterCard styling)
      // a.classList.add('posterCard');
    }

    const img = document.createElement('img');
    img.loading = 'lazy';
    img.alt = e.title || '';
    img.src = e.image;

    a.appendChild(img);
    return a;
  }

  function updateActiveMode(mode){
    modeButtons.forEach(btn => {
      const is = btn.dataset.mode === mode;
      btn.classList.toggle('isActive', is);
    });
  }

  function shufflePosters(){
    const posters = Array.from(grid.querySelectorAll('.poster'));
    for(let i = posters.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = posters[i];
      posters[i] = posters[j];
      posters[j] = tmp;
    }
    posters.forEach(p => grid.appendChild(p));
  }

  function randomizeVars(){
    const posters = Array.from(grid.querySelectorAll('.poster'));
    // stronger "plutí" + overlap
    posters.forEach((el, i) => {
      const tx  = (Math.random()*2 - 1) * 14;     // -27..27 (mírnější rozkývání)
      const ty  = (Math.random()*2 - 1) * 22;     // -43..43 (mírnější rozkývání)
      const rot = (Math.random()*2 - 1) * 1.6;    // -3.1..3.1 deg
      const scl = 0.99 + Math.random()*0.05;      // 0.98..1.06 (méně rozdílů)
      const lift= 0;                              // (nepoužíváme layout lift – jen transform)
      const z   = 1 + Math.round(Math.random()*3);  // 1..7 (méně překryvů)

      el.style.setProperty('--tx', tx.toFixed(1)+'px');
      el.style.setProperty('--ty', ty.toFixed(1)+'px');
      el.style.setProperty('--rot', rot.toFixed(2)+'deg');
      el.style.setProperty('--scl', scl.toFixed(3));
      el.style.setProperty('--lift', lift+'px');
      el.style.setProperty('--z', z);
    });
  }

  function clearRandomVars(){
    const posters = Array.from(grid.querySelectorAll('.poster'));
    posters.forEach(el => {
      el.style.removeProperty('--tx');
      el.style.removeProperty('--ty');
      el.style.removeProperty('--rot');
      el.style.removeProperty('--scl');
      el.style.removeProperty('--lift');
      el.style.removeProperty('--z');
    });
  }

  function flipAnimate(before){
    const posters = Array.from(grid.querySelectorAll('.poster'));
    posters.forEach(el => {
      const key = el.dataset.key;
      const b = before.get(key);
      if(!b) return;
      const a = el.getBoundingClientRect();
      const dx = b.left - a.left;
      const dy = b.top - a.top;
      if(Math.abs(dx)+Math.abs(dy) < 0.5) return;

      el.style.setProperty('--flipX', dx.toFixed(1)+'px');
      el.style.setProperty('--flipY', dy.toFixed(1)+'px');
      el.style.willChange = 'transform';

      // next frame -> animate to 0
      requestAnimationFrame(() => {
        el.style.setProperty('--flipX', '0px');
        el.style.setProperty('--flipY', '0px');
        // cleanup will-change after transition
        setTimeout(() => { el.style.willChange = ''; }, 650);
      });
    });
  }

  function setMode(mode){
  const posters = Array.from(grid.querySelectorAll('.poster'));
  const before = new Map();
  posters.forEach(el => before.set(el.dataset.key, el.getBoundingClientRect()));

    // allow repeated clicks:
  // - random: reshuffle + re-randomize
  // - date: re-enforce true date order (useful after any DOM churn)
  if(mode === currentMode){
    if(mode === 'random'){
      shufflePosters();
      randomizeVars();
      requestAnimationFrame(() => flipAnimate(before));
    } else {
      // DATE MODE (re-apply)
      clearRandomVars();

      const posters = Array.from(grid.querySelectorAll('.poster'));
      const map = new Map();
      posters.forEach(p => map.set(Number(p.dataset.key), p));

      grid.innerHTML = '';
      items.forEach((_, idx) => {
        const el = map.get(idx);
        if(el) grid.appendChild(el);
      });

      requestAnimationFrame(() => flipAnimate(before));
    }
    return;
  }
currentMode = mode;
  grid.classList.toggle('randomMode', mode === 'random');
  updateActiveMode(mode);

  setPosterLinksEnabled(mode !== 'random');

  if(mode === 'random'){
    shufflePosters();
    randomizeVars();
  }else{
    // DATE MODE – vrátit skutečné pořadí podle data
    clearRandomVars();

    // znovu připojit postery podle pořadí v items
    const posters = Array.from(grid.querySelectorAll('.poster'));
    const map = new Map();
    posters.forEach(p => map.set(Number(p.dataset.key), p));

    grid.innerHTML = '';
    items.forEach((_, idx) => {
      const el = map.get(idx);
      if(el) grid.appendChild(el);
    });
  }

  requestAnimationFrame(() => flipAnimate(before));
}

  function setPosterLinksEnabled(enabled){
    // enabled=true: plakáty jsou normální odkazy (date mód)
    // enabled=false: v random módu odstraníme href, aby prohlížeč nikdy neskákal na # ani neotevíral link
    const posters = Array.from(grid.querySelectorAll('.poster'));
    posters.forEach(p => {
      if(p.tagName !== 'A') return;
      if(enabled){
        if(p.dataset.realHref){
          p.setAttribute('href', p.dataset.realHref);
          delete p.dataset.realHref;
        }
      }else{
        // ulož původní href a pak ho smaž
        const h = p.getAttribute('href');
        if(h){
          p.dataset.realHref = h;
        }
        p.removeAttribute('href');
      }
    });
  }

  // ===== HERO (odloupnutí plakátu) =====
  const heroOverlay = document.getElementById('heroOverlay');
  const heroCard = heroOverlay ? heroOverlay.querySelector('.heroCard') : null;

  let heroOpen = false;
  let heroFrom = null; // {left,top,width,height,borderRadius}
  let heroSrc = null;
  let heroJustOpenedAt = 0;

  function getPosterFromTarget(t){
    const el = t.closest && t.closest('.poster');
    return el || null;
  }

  function openHero(posterEl){
    if(!heroOverlay || !heroCard) return;
    const img = posterEl.querySelector('img');
    if(!img) return;

    const rect = img.getBoundingClientRect();
    heroFrom = { left: rect.left, top: rect.top, width: rect.width, height: rect.height, r: 18 };
    heroSrc = img.currentSrc || img.src;

    // lock scroll
    document.body.classList.add('heroOpen');
    heroOverlay.classList.add('isOpen');
    heroOverlay.setAttribute('aria-hidden', 'false');
    heroOpen = true;
    // Mobile "ghost click" guard: overlay se může objevit pod prstem a hned dostat klik -> okamžité zavření.
    heroJustOpenedAt = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();

    // Build hero card content (roll/unroll)
    heroCard.innerHTML = '';
    heroCard.classList.remove('unrolling','rollingUp');
    const wrap = document.createElement('div');
    wrap.className = 'rollWrap';
    const hi = document.createElement('img');
    hi.alt = img.alt || '';
    hi.src = heroSrc;
    // init roll state (avoid stuck thin strip on some mobile compositors)
wrap.style.transform = 'scaleY(0.02)';
wrap.style.filter = 'blur(1.6px)';
wrap.appendChild(hi);
    heroCard.appendChild(wrap);
// force reflow so the unroll animation always triggers reliably
void wrap.offsetHeight;


    // Start at original rect
    heroCard.style.left = heroFrom.left + 'px';
    heroCard.style.top = heroFrom.top + 'px';
    heroCard.style.width = heroFrom.width + 'px';
    heroCard.style.height = heroFrom.height + 'px';
    heroCard.style.borderRadius = '0px';

    // Target size
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxW = Math.min(vw - 32, 980);
    const maxH = Math.min(vh - 96, 900);
    const natW = img.naturalWidth || rect.width;
    const natH = img.naturalHeight || rect.height;
    const scale = Math.min(maxW / natW, maxH / natH, 1.0);
    const tW = Math.max(240, Math.round(natW * scale));
    const tH = Math.max(240, Math.round(natH * scale));
    const tL = Math.round((vw - tW) / 2);
    const tT = Math.round((vh - tH) / 2);

    // Animate to center
    heroCard.style.transition = 'none';
    requestAnimationFrame(() => {
      heroCard.style.transition = 'left 360ms cubic-bezier(.2,.85,.2,1), top 360ms cubic-bezier(.2,.85,.2,1), width 360ms cubic-bezier(.2,.85,.2,1), height 360ms cubic-bezier(.2,.85,.2,1), border-radius 360ms ease';
      heroCard.style.left = tL + 'px';
      heroCard.style.top = tT + 'px';
      heroCard.style.width = tW + 'px';
      heroCard.style.height = tH + 'px';
      heroCard.style.borderRadius = '0px';
      // start "odrolování" efekt
      heroCard.classList.remove('rollingUp');
      heroCard.classList.add('unrolling');
    });

    // Optional: shift ambient to selected poster (jemně)
    if(img.complete){
      setPosterTexture(img);
      getAverageColor(img).then(setAmbientTarget).catch(()=>{});
    }
  }

  function closeHero(){
    if(!heroOverlay || !heroCard || !heroOpen || !heroFrom) return;

    // start roll-up immediately
    heroCard.classList.remove('unrolling');
    heroCard.classList.add('rollingUp');

    heroCard.style.transition = 'left 260ms cubic-bezier(.2,.8,.2,1), top 260ms cubic-bezier(.2,.8,.2,1), width 260ms cubic-bezier(.2,.8,.2,1), height 260ms cubic-bezier(.2,.8,.2,1), border-radius 260ms ease';
    heroCard.style.left = heroFrom.left + 'px';
    heroCard.style.top = heroFrom.top + 'px';
    heroCard.style.width = heroFrom.width + 'px';
    heroCard.style.height = heroFrom.height + 'px';
    heroCard.style.borderRadius = '0px';

    window.setTimeout(() => {
      heroOverlay.classList.remove('isOpen');
      heroOverlay.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('heroOpen');
      heroCard.classList.remove('unrolling','rollingUp');
      heroCard.innerHTML = '';
      heroOpen = false;
      heroFrom = null;
      heroSrc = null;
      heroJustOpenedAt = 0;
    }, 280);
  }

  if(heroOverlay){
    heroOverlay.addEventListener('click', (e) => {
      // ignoruj první klik hned po otevření (touch -> click na mobilu)
      const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      if(heroJustOpenedAt && (now - heroJustOpenedAt) < 380) return;
      // zavírej klikem na backdrop i na samotný plakát (rychlé toggle)
      const t = e.target;
      const isBackdrop = t && (t.getAttribute && t.getAttribute('data-hero-close') === '1');
      const isCard = t && (t.closest && t.closest('.heroCard'));
      if(isBackdrop || isCard) closeHero();
    });
    window.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closeHero();
    });
  }


  function setupAmbientObserver(){
    if(observer) observer.disconnect();

    const imgs = Array.from(grid.querySelectorAll('img'));
    if(!imgs.length) return;

    // initial
    imgs[0].addEventListener('load', async () => {
      setPosterTexture(imgs[0]);
      setAmbientTarget(await getAverageColor(imgs[0]));
    }, { once:true });

    // track the image closest to center via intersection ratio
    observer = new IntersectionObserver(async (entries) => {
      const best = entries
        .filter(e => e.isIntersecting)
        .sort((a,b)=> b.intersectionRatio - a.intersectionRatio)[0];
      if(!best) return;

      const img = best.target;
      if(!img.complete) return;

      // subtle texture + smooth color
      setPosterTexture(img);
      const rgb = await getAverageColor(img);
      setAmbientTarget(rgb);
    }, { threshold: [0.35, 0.55, 0.72] });

    imgs.forEach(img => {
      if(img.complete) observer.observe(img);
      else img.addEventListener('load', () => observer.observe(img), { once:true });
    });
  }

  async function init(){
    // fetch json
    const res = await fetch(DATA_URL, { cache:'no-store' });
    if(!res.ok) throw new Error('Nejde načíst '+DATA_URL+' (status '+res.status+')');
    const all = await res.json();

    const today = new Date(); today.setHours(0,0,0,0);
    items = (all||[])
      .filter(e => e && e.date && e.image && parseDate(e.date) < today)
      .sort((a,b)=> parseDate(b.date) - parseDate(a.date));

    if(!items.length){
      grid.innerHTML = '<div class="err">V JSONu nejsou žádné minulé akce.</div>';
      return;
    }

    // render once (stable DOM so FLIP works)
    grid.innerHTML = '';
    items.forEach((e, idx) => grid.appendChild(posterEl(e, idx)));

    // HERO click: jen v režimu random (toggle open/close na stejný plakát)
    // --- poster fullscreen (jen v random režimu) ---
    let lastHeroPointerUpAt = 0;

    function handlePosterActivate(ev){
      const p = getPosterFromTarget(ev.target);
      if(!p) return;

      // jen v random režimu
      if(!grid.classList.contains('randomMode')) return;

      // v random režimu neodcházej pryč – otevři/zaklapni fullscreen
      if(ev.cancelable) ev.preventDefault();
      ev.stopPropagation();

      const img = p.querySelector('img');
      const src = img ? (img.currentSrc || img.src) : null;

      if(heroOpen){
        // klik na stejný plakát -> zavřít, klik na jiný -> přepnout na nový
        if(src && src === heroSrc){
          closeHero();
          return;
        }
      }
      openHero(p);
    }

    // Na mobilech je spolehlivější pointerup než click (a zabrání to i hash-jumpu na #)
    grid.addEventListener('pointerup', (ev) => {
      lastHeroPointerUpAt = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      handlePosterActivate(ev);
    }, { passive:false });

    // Click musí v random režimu vždy zastavit navigaci (u <a> je default až na click, ne na pointerup).
    // Proto i když click ignorujeme kvůli guardu (pointerup -> click), pořád uděláme preventDefault().
    grid.addEventListener('click', (ev) => {
      const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();

      // když jsme v random režimu a klik je na plakát, vždy stopni default (jinak to skáče na # / otevírá link)
      if(grid.classList.contains('randomMode')){
        const p = getPosterFromTarget(ev.target);
        if(p){
          if(ev.cancelable) ev.preventDefault();
          ev.stopPropagation();
        }
      }

      // guard proti dvojitému vyvolání (pointerup -> click)
      if(now - lastHeroPointerUpAt < 450) return;

      handlePosterActivate(ev);
    }, { passive:false });

    // hook buttons
    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });

    // default mode = date
    updateActiveMode('date');
    clearRandomVars();
    setPosterLinksEnabled(true);

    setupAmbientObserver();
    applyAmbient();
  }

  init().catch(err => {
    grid.innerHTML = '<div class="err">'+String(err.message || err)+'</div>';
  });
</script>

<script>
/* ===== FORCE-2COL controller (no overlay) ===== */
(function(){
  const html = document.documentElement;
  const isTouch = (navigator.maxTouchPoints && navigator.maxTouchPoints > 0) || ('ontouchstart' in window);
  if(isTouch) html.classList.add('isTouch');

  const grid = document.getElementById('eventsGrid');
  if(!grid) return;

  function apply(){
    const on = grid.classList.contains('randomMode');
    grid.classList.toggle('force2col', on && isTouch);
  }

  // Repaint nudge on scroll (helps "half poster disappears")
  let raf=0;
  function nudge(){
    if(!(isTouch && grid.classList.contains('randomMode'))) return;
    grid.classList.add('paintNudge');
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(()=> grid.classList.remove('paintNudge'));
  }

  window.addEventListener('scroll', ()=>{ if(isTouch) nudge(); }, {passive:true});

  // Observe mode changes (date <-> rndm)
  new MutationObserver(apply).observe(grid, {attributes:true, attributeFilter:['class']});
  window.addEventListener('resize', apply, {passive:true});
  window.addEventListener('orientationchange', apply, {passive:true});

  // Initial
  apply();
})();
</script>

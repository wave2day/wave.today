<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Top bar — pills + buttons</title>

  <style>
    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0;
      background:#0b0b10;
      color:#eef0ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x:hidden;
    }
    a,button{ -webkit-tap-highlight-color: transparent; }
    a:focus, a:focus-visible, button:focus, button:focus-visible{ outline: none !important; box-shadow:none !important; }

    /* ===== Layout ===== */
    .topBar{
      position: fixed;
      top: 0;
      left: 0; right: 0;
      z-index: 20;
      width: min(1180px, calc(100vw - 36px));
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 12px) 0 16px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 14px;
    }
    .rightGroup{
      display:flex;
      gap:12px;
      align-items:center;
      margin-left:auto;
    }

    /* ===== Shared glass engine (sjednocené pro pill i round) ===== */
    :root{
      --outer: 190px;
      --innerRatio: .65;
      --ring: 13px;
      --rimBlur: 1.05px;

      --glassClearA: rgba(255,255,255,.14);
      --glassClearB: rgba(255,255,255,.08);
      --glassMilkA:  rgba(255,255,255,.10);
      --glassMilkB:  rgba(255,255,255,.12);

      --topRim1: rgba(0,0,0,.28);
      --topRim2: rgba(0,0,0,.12);
      --topRimFade: 30%;

      --botRim1: rgba(255,255,255,.74);
      --botRim2: rgba(255,255,255,.30);

      --bleedA: .14;
      --bleedB: .07;

      --pressY: 3px;
      --pressIn: 110ms;
      --pressOut: 190ms;

      --textColor: rgba(255,255,255,.92);
      --textSize: 34px;
      --textScaleX: 1.10;
      --textWidth: 92%;

      --stroke: rgba(0,0,0,.34);
      --depth1: rgba(0,0,0,.30);
      --depth2: rgba(0,0,0,.18);
      --lacquer: rgba(255,255,255,.28);

      /* Blue theme (v-blue) */
      --c1:#6f7ed0; --c2:#5462bb; --c3:#4a57ae;
      --rimTint: 120, 155, 255;
      --bleedX: 76%;
      --bleedY: 84%;
    }

    .wtBarRow{
      display:flex;
      align-items:center;
      gap:12px;
    }

    /* Base glass shell */
    .wtGlass{
      width: var(--outer);
      height: var(--outer);
      border-radius: 50%;
      position: relative;
      display:grid;
      place-items:center;
      isolation:isolate;

      background:
        radial-gradient(120% 120% at 50% 60%, var(--glassMilkA), transparent 62%),
        radial-gradient(120% 120% at 50% 92%, var(--glassMilkB), transparent 58%),
        radial-gradient(120% 120% at 35% 25%, var(--glassClearA), transparent 55%),
        radial-gradient(140% 140% at 65% 70%, var(--glassClearB), transparent 60%),
        rgba(255,255,255,.08);

      box-shadow:
        inset 0 18px 26px rgba(0,0,0,.24),
        inset 0 -22px 30px rgba(255,255,255,.22),
        0 22px 44px rgba(0,0,0,.18);

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      transition: filter var(--pressOut) ease;
      transform-origin: left center;
    }

    .wtGlass::before{
      content:"";
      position:absolute;
      inset: 10px;
      border-radius: inherit;
      pointer-events:none;
      z-index:1;
      background:
        radial-gradient(75% 60% at 18% 22%,
          rgba(255,255,255,.42) 0%,
          rgba(255,255,255,.18) 35%,
          transparent 72%),
        radial-gradient(55% 45% at 28% 32%,
          rgba(255,255,255,.18) 0%,
          transparent 72%);
      filter: blur(1.35px);
      opacity:.90;
    }

    .wtGlass::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius: inherit;
      pointer-events:none;
      z-index:2;

      background:
        radial-gradient(72% 60% at var(--bleedX) var(--bleedY),
          rgba(var(--rimTint), var(--bleedA)) 0%,
          rgba(var(--rimTint), var(--bleedB)) 28%,
          transparent 68%),

        conic-gradient(from 210deg,
          transparent 0 18%,
          rgba(var(--rimTint), .12) 22%,
          transparent 36%,
          rgba(var(--rimTint), .06) 46%,
          transparent 62%,
          rgba(var(--rimTint), .045) 70%,
          transparent 100%),

        radial-gradient(140% 120% at 50% 120%,
          var(--botRim1) 0%,
          var(--botRim2) 22%,
          transparent 52%),

        radial-gradient(170% 120% at 50% -38%,
          var(--topRim1) 0%,
          var(--topRim2) 14%,
          transparent var(--topRimFade));

      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;

      padding: var(--ring);
      filter: blur(var(--rimBlur));
      opacity:.95;
    }

    .pressGlow{
      position:absolute;
      inset:-22px;
      border-radius: 999px;
      pointer-events:none;
      opacity:0;
      filter: blur(10px);
      transition: opacity var(--pressOut) ease, transform var(--pressOut) ease;
      transform: scale(0.995);
      z-index:0;
      background:
        radial-gradient(80% 80% at 70% 70%,
          rgba(var(--rimTint), .18) 0%,
          rgba(var(--rimTint), .10) 26%,
          transparent 62%),
        radial-gradient(100% 90% at 50% 110%,
          rgba(255,255,255,.20) 0%,
          transparent 55%);
    }

    /* Core button/link */
    .wtCore{
      --cw: calc(var(--outer) * var(--innerRatio));
      --ch: calc(var(--outer) * var(--innerRatio));

      width: var(--cw);
      height: var(--ch);
      border-radius: 999px;

      position:relative;
      z-index:3;
      border:0;
      padding:0;

      cursor:pointer;
      user-select:none;
      text-decoration:none;

      display:grid;
      place-items:center;

      background:
        radial-gradient(120% 120% at 35% 25%, rgba(255,255,255,.16), transparent 55%),
        linear-gradient(180deg, var(--c1), var(--c2) 55%, var(--c3));

      box-shadow:
        0 18px 26px rgba(0,0,0,.18),
        inset 0 16px 22px rgba(0,0,0,.13),
        inset 0 -14px 20px rgba(255,255,255,.14);

      transform: translateY(0);
      transition:
        transform var(--pressOut) cubic-bezier(.2,.8,.2,1),
        box-shadow var(--pressOut) ease,
        filter var(--pressOut) ease;
    }

    /* Press interaction (sjednocené) */
    .wtGlass:has(.wtCore:active){ filter: brightness(.985); transition: filter var(--pressIn) ease; }
    .wtGlass:has(.wtCore:active) .pressGlow{ opacity:1; transform: scale(1.01); transition: opacity var(--pressIn) ease, transform var(--pressIn) ease; }
    .wtCore:active{
      transform: translateY(var(--pressY));
      transition:
        transform var(--pressIn) cubic-bezier(.2,.8,.2,1),
        box-shadow var(--pressIn) ease,
        filter var(--pressIn) ease;
      box-shadow:
        0 10px 18px rgba(0,0,0,.16),
        inset 0 20px 26px rgba(0,0,0,.18),
        inset 0 -10px 16px rgba(255,255,255,.10);
      filter: brightness(.99) saturate(.98);
    }

    /* Label text */
    .wtText{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;

      width: var(--textWidth);
      margin: 0 auto;

      color: var(--textColor);
      font-weight: 760;
      font-size: var(--textSize);
      letter-spacing: .40px;
      line-height: 1;
      text-transform: lowercase;

      transform: scaleX(var(--textScaleX));
      transform-origin: center;

      text-shadow:
        -0.75px 0      0 var(--stroke),
         0.75px 0      0 var(--stroke),
         0      -0.75px 0 var(--stroke),
         0       0.75px 0 var(--stroke),
        -0.55px -0.55px 0 var(--stroke),
         0.55px -0.55px 0 var(--stroke),
        -0.55px  0.55px 0 var(--stroke),
         0.55px  0.55px 0 var(--stroke),
        0 -0.55px 0 var(--lacquer),
        0  1.25px 1.45px var(--depth1),
        0  3px    8px    var(--depth2);
    }

    /* ===== Pill variant (jen šířka) ===== */
    .wtGlass.isPill{
      width: 440px;              /* původní pillW */
      border-radius: 999px;
      transform-origin: left center;
    }
    .wtGlass.isPill::before,
    .wtGlass.isPill::after,
    .wtGlass.isPill .pressGlow{
      border-radius: 999px;
    }
    .wtGlass.isPill .wtCore{
      width: calc(440px - (2 * (var(--outer) * (1 - var(--innerRatio)) / 2)));
      height: calc(var(--outer) * var(--innerRatio));
      border-radius: 999px;
    }

    /* ===== Scaling in top bar (stejné chování jako dřív) ===== */
    .scalePill{ zoom: .253; }
    .scaleRound{ zoom: .235; }
    @supports not (zoom: 1){
      .scalePill{ zoom:1; transform: scale(.253); transform-origin:left center; }
      .scaleRound{ zoom:1; transform: scale(.235); transform-origin:center; }
    }

    /* ===== Active state (jen logický, žádná vizuální magie navíc) ===== */
    .wtModeBtn{ display:flex; align-items:center; }
    .wtModeBtn.isActive{ filter: saturate(1.06) brightness(1.03); }

    /* Page placeholder */
    .page{
      min-height: 100vh;
      padding: 160px 18px 90px;
    }
    .hint{
      opacity:.85;
      max-width: 980px;
      margin: 0 auto;
      line-height: 1.4;
      font-weight: 650;
      letter-spacing:.2px;
    }
  </style>
</head>

<body>
  <div class="topBar">
    <!-- MAIN PAGE pill -->
    <div class="wtBarRow" aria-label="Main page">
      <div class="wtGlass isPill scalePill" id="mainPill">
        <div class="pressGlow"></div>
        <a class="wtCore" href="index.html" aria-label="Main page">
          <span class="wtText">main page</span>
        </a>
      </div>
    </div>

    <!-- MODE buttons -->
    <div class="rightGroup">
      <div id="wtModes" class="wtBarRow" aria-label="Řazení">
        <div class="wtModeBtn isActive" data-mode="date" aria-label="Řazení podle data">
          <div class="wtGlass scaleRound">
            <div class="pressGlow"></div>
            <button class="wtCore" type="button" aria-label="date">
              <span class="wtText">date</span>
            </button>
          </div>
        </div>

        <div class="wtModeBtn" data-mode="random" aria-label="Náhodné rozložení">
          <div class="wtGlass scaleRound">
            <div class="pressGlow"></div>
            <button class="wtCore" type="button" aria-label="rndm">
              <span class="wtText">rndm</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- jen aby bylo vidět, že topbar sedí a stránka žije -->
  <main class="page">
    <div class="hint">
      Tohle je jen startovní skelet: horní pill + dvě kulatá tlačítka. Kliky přepínají active stav.
    </div>
  </main>

  <script>
    (function(){
      const modeButtons = Array.from(document.querySelectorAll('#wtModes .wtModeBtn'));
      let currentMode = 'date';

      function updateActiveMode(mode){
        modeButtons.forEach(btn => btn.classList.toggle('isActive', btn.dataset.mode === mode));
      }

      function setMode(mode){
        currentMode = mode;
        updateActiveMode(mode);

        // Hook pro další stavbu:
        // tady pak napojíš grid/render logiku (date vs rndm),
        // ale topbar zůstane stejný.
        document.documentElement.dataset.mode = mode;
      }

      modeButtons.forEach(btn => {
        btn.addEventListener('click', () => setMode(btn.dataset.mode));
      });

      updateActiveMode(currentMode);
    })();
  </script>
</body>
</html>
